<?xml version="1.0" encoding="UTF-8"?>
<svg
  width="1200"
  height="630"
  viewBox="0 0 1200 630"
  fill="none"
  xmlns="http://www.w3.org/2000/svg"
  role="img"
  aria-label="Why JavaScript Needs Structured Concurrency — Promises leak work out of bounds, Effection keeps everything inside the scope"
>
  <defs>
    <!-- Light-mode background gradient -->
    <linearGradient
      id="bg-light-grad"
      x1="0"
      y1="0"
      x2="1200"
      y2="630"
      gradientUnits="userSpaceOnUse"
    >
      <stop offset="0" stop-color="#F8FAFF" />
      <stop offset="0.55" stop-color="#F2F7FF" />
      <stop offset="1" stop-color="#ECF3FF" />
    </linearGradient>

    <!-- Light-mode decorative glow -->
    <radialGradient
      id="glow-light-grad"
      cx="0"
      cy="0"
      r="1"
      gradientUnits="userSpaceOnUse"
      gradientTransform="translate(900 120) rotate(120) scale(560 420)"
    >
      <stop offset="0" stop-color="#2B6FF7" stop-opacity="0.22" />
      <stop offset="0.55" stop-color="#2B6FF7" stop-opacity="0.07" />
      <stop offset="1" stop-color="#2B6FF7" stop-opacity="0" />
    </radialGradient>

    <!-- Dark-mode decorative glow -->
    <radialGradient
      id="glow-dark-grad"
      cx="0"
      cy="0"
      r="1"
      gradientUnits="userSpaceOnUse"
      gradientTransform="translate(900 120) rotate(120) scale(560 420)"
    >
      <stop offset="0" stop-color="#60A5FA" stop-opacity="0.10" />
      <stop offset="0.55" stop-color="#60A5FA" stop-opacity="0.03" />
      <stop offset="1" stop-color="#60A5FA" stop-opacity="0" />
    </radialGradient>

    <!-- Light-mode title gradient -->
    <linearGradient id="ink" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0B2A5B" />
      <stop offset="1" stop-color="#0C3A7A" />
    </linearGradient>

    <!-- Light-mode shadow (card) -->
    <filter
      id="softShadow-light"
      x="-40"
      y="-40"
      width="1280"
      height="710"
      filterUnits="userSpaceOnUse"
      color-interpolation-filters="sRGB"
    >
      <feDropShadow
        dx="0"
        dy="10"
        stdDeviation="18"
        flood-color="#0B2A5B"
        flood-opacity="0.12"
      />
    </filter>

    <!-- Dark-mode shadow (card) -->
    <filter
      id="softShadow-dark"
      x="-40"
      y="-40"
      width="1280"
      height="710"
      filterUnits="userSpaceOnUse"
      color-interpolation-filters="sRGB"
    >
      <feDropShadow
        dx="0"
        dy="10"
        stdDeviation="18"
        flood-color="#000000"
        flood-opacity="0.25"
      />
    </filter>

    <!-- Light-mode shadow (inner) -->
    <filter
      id="tinyShadow-light"
      x="-40"
      y="-40"
      width="1280"
      height="710"
      filterUnits="userSpaceOnUse"
      color-interpolation-filters="sRGB"
    >
      <feDropShadow
        dx="0"
        dy="5"
        stdDeviation="10"
        flood-color="#0B2A5B"
        flood-opacity="0.10"
      />
    </filter>

    <!-- Dark-mode shadow (inner) -->
    <filter
      id="tinyShadow-dark"
      x="-40"
      y="-40"
      width="1280"
      height="710"
      filterUnits="userSpaceOnUse"
      color-interpolation-filters="sRGB"
    >
      <feDropShadow
        dx="0"
        dy="5"
        stdDeviation="10"
        flood-color="#000000"
        flood-opacity="0.20"
      />
    </filter>

    <style>/* ---- Font stacks ---- */
    .svg-title {
      font-family:
        ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica,
        Arial, "Apple Color Emoji", "Segoe UI Emoji";
      font-size: 48px;
      font-weight: 800;
      letter-spacing: -0.02em;
    }
    .svg-subtitle {
      font-family:
        ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica,
        Arial, "Apple Color Emoji", "Segoe UI Emoji";
      font-size: 18px;
      font-weight: 600;
      letter-spacing: 0.02em;
      text-transform: uppercase;
    }
    .svg-caption {
      font-family:
        ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica,
        Arial, "Apple Color Emoji", "Segoe UI Emoji";
      font-size: 18px;
      font-weight: 600;
    }
    .svg-mono {
      font-family:
        ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas,
        "Liberation Mono", "Courier New", monospace;
      font-size: 14px;
    }
    .svg-mono-sm {
      font-family:
        ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas,
        "Liberation Mono", "Courier New", monospace;
      font-size: 12px;
    }
    .svg-label {
      font-family:
        ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica,
        Arial, "Apple Color Emoji", "Segoe UI Emoji";
      font-size: 15px;
      font-weight: 700;
      letter-spacing: 0.03em;
      text-transform: uppercase;
    }

    /* ---- Light mode (default) ---- */
    .svg-bg-light {
      display: block;
    }
    .svg-bg-dark {
      display: none;
    }
    .svg-glow-light {
      display: block;
    }
    .svg-glow-dark {
      display: none;
    }
    .svg-shadow-light {
      display: block;
    }
    .svg-shadow-dark {
      display: none;
    }

    .svg-grid {
      opacity: 0.25;
    }
    .svg-grid-line {
      stroke: #c9d9f2;
      stroke-width: 1;
    }

    .svg-card {
      fill: #ffffff;
    }
    .svg-divider {
      stroke: #d6e4ff;
      stroke-dasharray: 4 4;
      stroke-width: 1;
    }

    /* Left side: Promises (broken) */
    .svg-dashed-boundary {
      stroke: #b8ccf5;
      stroke-width: 2;
      stroke-dasharray: 8 4;
      fill: none;
    }
    .svg-dashed-label {
      fill: #e6f0ff;
    }
    .svg-overflow-box {
      fill: #ffffff;
      stroke: #ea580c;
      stroke-width: 1.5;
    }
    .svg-overflow-dot {
      fill: #ea580c;
    }
    .svg-leak-text {
      fill: #ea580c;
    }
    .svg-uncertain-text {
      fill: #ea580c;
    }

    /* Right side: Effection (structured) */
    .svg-scope-parent {
      fill: #f7fbff;
      stroke: #97b7ff;
      stroke-width: 2;
    }
    .svg-scope-label {
      fill: #e6f0ff;
    }
    .svg-scope-child {
      fill: #ffffff;
      stroke: #2b6ff7;
      stroke-width: 2;
    }
    .svg-scope-child-label {
      fill: #e8f4ff;
    }
    .svg-contained-box {
      fill: #ffffff;
      stroke: #2b6ff7;
      stroke-width: 1.5;
    }
    .svg-dot-primary {
      fill: #2b6ff7;
    }
    .svg-dot-secondary {
      fill: #0ea5e9;
    }
    .svg-check-text {
      fill: #16a34a;
      stroke: #16a34a;
    }
    .svg-arrow-line {
      stroke: #97b7ff;
      fill: none;
    }

    /* Shared text */
    .svg-title {
      fill: url(#ink);
    }
    .svg-subtitle {
      fill: #33547b;
    }
    .svg-caption {
      fill: #23435f;
    }
    .svg-mono {
      fill: #1e3a8a;
    }
    .svg-mono-sm {
      fill: #1e3a8a;
    }
    .svg-label {
      fill: #33547b;
    }
    .svg-label-heading {
      fill: #0b2a5b;
    }

    /* ---- Dark mode ---- */
    @media (prefers-color-scheme: dark) {
      .svg-bg-light {
        display: none;
      }
      .svg-bg-dark {
        display: block;
      }
      .svg-glow-light {
        display: none;
      }
      .svg-glow-dark {
        display: block;
      }
      .svg-shadow-light {
        display: none;
      }
      .svg-shadow-dark {
        display: block;
      }

      .svg-grid {
        opacity: 0.20;
      }
      .svg-grid-line {
        stroke: #374151;
      }

      .svg-card {
        fill: #1f2937;
      }
      .svg-divider {
        stroke: #374151;
      }

      .svg-dashed-boundary {
        stroke: #4b5563;
      }
      .svg-dashed-label {
        fill: #1e3a8a;
      }
      .svg-overflow-box {
        fill: #1f2937;
        stroke: #fb923c;
      }
      .svg-overflow-dot {
        fill: #fb923c;
      }
      .svg-leak-text {
        fill: #fb923c;
      }
      .svg-uncertain-text {
        fill: #fb923c;
      }

      .svg-scope-parent {
        fill: #111827;
        stroke: #374151;
      }
      .svg-scope-label {
        fill: #1e3a8a;
      }
      .svg-scope-child {
        fill: #1f2937;
        stroke: #60a5fa;
      }
      .svg-scope-child-label {
        fill: #1e3a8a;
      }
      .svg-contained-box {
        fill: #1f2937;
        stroke: #60a5fa;
      }
      .svg-dot-primary {
        fill: #60a5fa;
      }
      .svg-dot-secondary {
        fill: #0ea5e9;
      }
      .svg-check-text {
        fill: #4ade80;
        stroke: #4ade80;
      }
      .svg-arrow-line {
        stroke: #60a5fa;
      }

      .svg-title {
        fill: #f3f4f6;
      }
      .svg-subtitle {
        fill: #9ca3af;
      }
      .svg-caption {
        fill: #d1d5db;
      }
      .svg-mono {
        fill: #e5e7eb;
      }
      .svg-mono-sm {
        fill: #e5e7eb;
      }
      .svg-label {
        fill: #9ca3af;
      }
      .svg-label-heading {
        fill: #f3f4f6;
      }
    }</style>
  </defs>

  <!-- ======== BACKGROUND ======== -->
  <rect
    class="svg-bg-light"
    x="0"
    y="0"
    width="1200"
    height="630"
    fill="url(#bg-light-grad)"
  />
  <rect
    class="svg-bg-dark"
    x="0"
    y="0"
    width="1200"
    height="630"
    fill="#111827"
  />
  <rect
    class="svg-glow-light"
    x="0"
    y="0"
    width="1200"
    height="630"
    fill="url(#glow-light-grad)"
  />
  <rect
    class="svg-glow-dark"
    x="0"
    y="0"
    width="1200"
    height="630"
    fill="url(#glow-dark-grad)"
  />

  <!-- ======== SUBTLE GRID ======== -->
  <g class="svg-grid">
    <path class="svg-grid-line" d="M90 90H1110" />
    <path class="svg-grid-line" d="M90 150H1110" />
    <path class="svg-grid-line" d="M90 210H1110" />
    <path class="svg-grid-line" d="M90 270H1110" />
    <path class="svg-grid-line" d="M90 330H1110" />
    <path class="svg-grid-line" d="M90 390H1110" />
    <path class="svg-grid-line" d="M90 450H1110" />
    <path class="svg-grid-line" d="M90 510H1110" />
    <path class="svg-grid-line" d="M90 570H1110" />
    <path class="svg-grid-line" d="M120 80V580" />
    <path class="svg-grid-line" d="M200 80V580" />
    <path class="svg-grid-line" d="M280 80V580" />
    <path class="svg-grid-line" d="M360 80V580" />
    <path class="svg-grid-line" d="M440 80V580" />
    <path class="svg-grid-line" d="M520 80V580" />
    <path class="svg-grid-line" d="M600 80V580" />
    <path class="svg-grid-line" d="M680 80V580" />
    <path class="svg-grid-line" d="M760 80V580" />
    <path class="svg-grid-line" d="M840 80V580" />
    <path class="svg-grid-line" d="M920 80V580" />
    <path class="svg-grid-line" d="M1000 80V580" />
    <path class="svg-grid-line" d="M1080 80V580" />
  </g>

  <!-- ======== TITLE (left side) ======== -->
  <text x="90" y="140" class="svg-subtitle">Effection Blog</text>
  <text x="90" y="205" class="svg-title">Why JavaScript</text>
  <text x="90" y="255" class="svg-title">Needs Structured</text>
  <text x="90" y="305" class="svg-title">Concurrency</text>
  <text x="90" y="355" class="svg-caption">Scope owns lifetime.</text>
  <text x="90" y="378" class="svg-caption">Cleanup is guaranteed.</text>

  <!-- ======== DIAGRAM CARD ======== -->
  <!-- Card starts at x=540 to avoid overlapping the title -->
  <g class="svg-shadow-light" filter="url(#softShadow-light)">
    <rect class="svg-card" x="540" y="80" width="580" height="470" rx="24" />
  </g>
  <g class="svg-shadow-dark" filter="url(#softShadow-dark)">
    <rect class="svg-card" x="540" y="80" width="580" height="470" rx="24" />
  </g>

  <!-- ======== DIVIDER ======== -->
  <line class="svg-divider" x1="830" y1="108" x2="830" y2="522" />

  <!-- ======== LEFT SIDE: PROMISES ======== -->

  <!-- Section heading -->
  <text
    x="680"
    y="128"
    class="svg-label svg-label-heading"
    text-anchor="middle"
  >Promises</text>

  <!-- Dashed function boundary — intentionally small so boxes overflow -->
  <!-- The boundary is 200×220, but the boxes are 180 wide -->
  <!-- so they poke out ~40px on the right side -->
  <rect
    class="svg-dashed-boundary"
    x="580"
    y="148"
    width="200"
    height="244"
    rx="14"
  />

  <!-- Function label -->
  <rect
    class="svg-dashed-label"
    x="592"
    y="158"
    width="100"
    height="24"
    rx="8"
  />
  <text x="604" y="175" class="svg-mono-sm">async fn()</text>

  <!-- Promise boxes — each 180px wide, but the boundary is only 200px  -->
  <!-- so the boxes extend 40px past the right edge (x=780 > boundary right=780) -->
  <!-- We offset them slightly right so they clearly overflow -->

  <!-- fetch() box — overflows right by ~30px, also tilted slightly via transform -->
  <g transform="translate(2, -3) rotate(1.5 680 216)">
    <rect
      class="svg-overflow-box"
      x="592"
      y="198"
      width="200"
      height="36"
      rx="10"
    />
    <circle class="svg-overflow-dot" cx="610" cy="216" r="5" />
    <text x="622" y="221" class="svg-mono-sm">fetch()</text>
  </g>

  <!-- setTimeout() box — overflows right by ~40px, slight opposite tilt -->
  <g transform="translate(6, 2) rotate(-1 700 276)">
    <rect
      class="svg-overflow-box"
      x="592"
      y="258"
      width="210"
      height="36"
      rx="10"
    />
    <circle class="svg-overflow-dot" cx="610" cy="276" r="5" />
    <text x="622" y="281" class="svg-mono-sm">setTimeout()</text>
  </g>

  <!-- listen() box — overflows right by ~50px, tilted more -->
  <g transform="translate(10, 4) rotate(2.5 700 336)">
    <rect
      class="svg-overflow-box"
      x="592"
      y="318"
      width="220"
      height="36"
      rx="10"
    />
    <circle class="svg-overflow-dot" cx="610" cy="336" r="5" />
    <text x="622" y="341" class="svg-mono-sm">server.listen()</text>
  </g>

  <!-- Status text below (warning color) -->
  <text x="592" y="430" class="svg-mono-sm svg-leak-text">● still pending</text>
  <text x="592" y="450" class="svg-mono-sm svg-leak-text">● still ticking</text>
  <text
    x="592"
    y="470"
    class="svg-mono-sm svg-leak-text"
  >● port still bound</text>

  <!-- Punchline -->
  <text
    x="592"
    y="508"
    class="svg-mono-sm svg-uncertain-text"
  >finally {} ?</text>

  <!-- ======== RIGHT SIDE: EFFECTION ======== -->

  <!-- Section heading -->
  <text
    x="975"
    y="128"
    class="svg-label svg-label-heading"
    text-anchor="middle"
  >Effection</text>

  <!-- Parent scope (solid boundary) — wide enough for the boxes -->
  <g class="svg-shadow-light" filter="url(#tinyShadow-light)">
    <rect
      class="svg-scope-parent"
      x="858"
      y="148"
      width="240"
      height="270"
      rx="14"
    />
    <rect
      class="svg-scope-label"
      x="872"
      y="158"
      width="106"
      height="24"
      rx="8"
    />
    <text x="884" y="175" class="svg-mono-sm">function*()</text>
  </g>
  <g class="svg-shadow-dark" filter="url(#tinyShadow-dark)">
    <rect
      class="svg-scope-parent"
      x="858"
      y="148"
      width="240"
      height="270"
      rx="14"
    />
    <rect
      class="svg-scope-label"
      x="872"
      y="158"
      width="106"
      height="24"
      rx="8"
    />
    <text x="884" y="175" class="svg-mono-sm">function*()</text>
  </g>

  <!-- Child scope (nested, solid) -->
  <rect
    class="svg-scope-child"
    x="874"
    y="196"
    width="208"
    height="200"
    rx="12"
  />
  <rect
    class="svg-scope-child-label"
    x="886"
    y="206"
    width="110"
    height="22"
    rx="8"
  />
  <text x="898" y="222" class="svg-mono-sm">spawned task</text>

  <!-- Contained effect boxes — same size as left side but they FIT -->
  <rect
    class="svg-contained-box"
    x="886"
    y="242"
    width="180"
    height="36"
    rx="10"
  />
  <circle class="svg-dot-primary" cx="904" cy="260" r="5" />
  <text x="916" y="265" class="svg-mono-sm">fetch()</text>

  <rect
    class="svg-contained-box"
    x="886"
    y="290"
    width="180"
    height="36"
    rx="10"
  />
  <circle class="svg-dot-primary" cx="904" cy="308" r="5" />
  <text x="916" y="313" class="svg-mono-sm">setTimeout()</text>

  <rect
    class="svg-contained-box"
    x="886"
    y="338"
    width="180"
    height="36"
    rx="10"
  />
  <circle class="svg-dot-secondary" cx="904" cy="356" r="5" />
  <text x="916" y="361" class="svg-mono-sm">server.listen()</text>

  <!-- Scope ends indicator -->
  <text x="918" y="440" class="svg-mono-sm svg-label">scope ends</text>

  <!-- Down arrow (solid, not dashed) -->
  <line
    x1="960"
    y1="448"
    x2="960"
    y2="480"
    stroke-width="2"
    class="svg-arrow-line"
  />
  <path
    d="M954 474 L960 484 L966 474"
    stroke-width="2"
    class="svg-arrow-line"
  />

  <!-- Checkmark -->
  <text
    x="880"
    y="498"
    class="svg-mono-sm svg-check-text"
    stroke="none"
  >✓ halted + cleaned up</text>

  <!-- ======== BOTTOM TAGLINE ======== -->
  <text
    x="90"
    y="560"
    class="svg-mono svg-caption"
  >Async should just feel normal.</text>
</svg>
